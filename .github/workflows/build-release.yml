name: PC App — Build & Release

on:
  push:
    tags:
      - "pc/v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-13
            artifact_name: MiniHead-Control-mac-intel.zip
          - os: macos-latest
            artifact_name: MiniHead-Control-mac-arm.zip
          - os: windows-latest
            artifact_name: MiniHead-Control-win.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: "PC APP"
        run: pip install flask pyinstaller pillow

      - name: Convert icon
        working-directory: "PC APP"
        run: python assets/convert_icon.py

      - name: Build with PyInstaller
        working-directory: "PC APP"
        run: pyinstaller minihead.spec --clean --noconfirm

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        working-directory: "PC APP/dist"
        run: zip -r "../../${{ matrix.artifact_name }}" "MiniHead Control.app"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        working-directory: "PC APP/dist"
        shell: pwsh
        run: Compress-Archive -Path "MiniHead Control" -DestinationPath "../../${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MiniHead Control ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## MiniHead Control ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | macOS — Intel (2019 und älter) | `MiniHead-Control-mac-intel.zip` |
            | macOS — Apple Silicon M1/M2/M3 | `MiniHead-Control-mac-arm.zip` |
            | Windows 10/11 | `MiniHead-Control-win.zip` |

            **macOS:** Unzip → App in Programme-Ordner → Rechtsklick → Öffnen (einmalig beim ersten Start)
            **Windows:** Unzip → `MiniHead Control.exe` starten

            See the [README](https://github.com/${{ github.repository }}/blob/main/PC%20APP/README.md) for full install instructions.
          files: |
            MiniHead-Control-mac-intel.zip
            MiniHead-Control-mac-arm.zip
            MiniHead-Control-win.zip
          draft: false
          prerelease: false
