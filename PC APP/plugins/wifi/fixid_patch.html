<style>
  .fp-title{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .fp-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .fp-label{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;}
  .fp-num{width:52px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 6px;font-family:var(--mono);font-size:12px;border-radius:3px;text-align:center;-moz-appearance:textfield;}
  .fp-num::-webkit-outer-spin-button,.fp-num::-webkit-inner-spin-button{-webkit-appearance:none;}
  .fp-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 6px;font-family:var(--mono);font-size:12px;border-radius:3px;outline:none;}
  .fp-input:focus{border-color:var(--accent);}
  .fp-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
  .fp-table th{text-align:left;color:var(--text-dim);font-weight:normal;padding:4px 6px;border-bottom:1px solid var(--border);letter-spacing:1px;font-size:10px;}
  .fp-table td{padding:5px 6px;border-bottom:1px solid rgba(42,42,58,0.5);vertical-align:middle;}
  .fp-table tr:last-child td{border-bottom:none;}
  .fp-badge{display:inline-block;font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;}
  .fp-badge.online{background:rgba(34,197,94,0.15);color:var(--success);border:1px solid rgba(34,197,94,0.3);}
  .fp-badge.offline{background:rgba(42,42,58,0.5);color:var(--text-dim);border:1px solid var(--border);}
  .fp-del{width:26px;height:26px;border:1px solid var(--border);background:transparent;color:var(--danger);border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .fp-id-btn{width:26px;height:26px;border:1px solid var(--border);background:transparent;color:var(--accent2);border-radius:3px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;letter-spacing:1px;}
  .fp-empty{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-align:center;padding:18px 0;}
  .net-btn{padding:6px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:4px;letter-spacing:1px;transition:all 0.15s;text-transform:uppercase;touch-action:manipulation;}
  .net-btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.08);}
  .net-btn.sm{padding:3px 8px;font-size:10px;}
  .fp-mac{font-size:10px;color:var(--text-dim);font-family:var(--mono);}
  .fp-name-cell input{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;width:100%;min-width:80px;}
  .fp-name-cell input:focus{border-bottom-color:var(--accent);}
  /* Two-column layout when wide enough */
  .fp-layout{display:grid;grid-template-columns:1fr;gap:0;align-items:start;}
  .fp-right{border-top:1px solid var(--border);margin-top:14px;padding-top:14px;}
  @media(min-width:700px){
    .fp-layout{grid-template-columns:1fr 1fr;gap:0;}
    .fp-right{border-top:none;margin-top:0;padding-top:0;padding-left:16px;border-left:1px solid var(--border);}
  }
  .fp-section-title{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
</style>

<div class="fp-title">// FixID Patch</div>

<div class="fp-layout">

  <!-- Left: Add fixture + fixture table -->
  <div class="fp-left">
    <!-- Add fixture row -->
    <div class="fp-row">
      <span class="fp-label">Fix#</span>
      <input type="number" id="fp_addFix" class="fp-num" value="1" min="1" max="999">
      <span class="fp-label">Name</span>
      <input type="text" id="fp_addName" class="fp-input" placeholder="Head 1" style="width:100px;">
      <button class="net-btn primary" onclick="fp_add()">ADD</button>
    </div>

    <!-- Fixture table -->
    <div id="fp_table"></div>
  </div>

  <!-- Right: Unpatched live heads -->
  <div class="fp-right">
    <div class="fp-section-title">Live Heads (unpatched)</div>
    <div id="fp_liveTable"></div>
  </div>

</div>

<script>
(function(){
  var FIX_HUES = [200,30,120,270,0,60,160,300,45,330];
  var fp_fixtures = [], fp_heads = [];
  var fp_identifyTimer = null;

  function fp_fixColor(fixID){
    return 'hsl('+FIX_HUES[(fixID-1)%FIX_HUES.length]+',68%,52%)';
  }

  function fp_load(){
    Promise.all([
      fetch('/api/fixtures').then(function(r){return r.json();}),
      fetch('/api/heads').then(function(r){return r.json();}).catch(function(){return[];})
    ]).then(function(res){
      fp_fixtures = res[0];
      fp_heads    = res[1];
      fp_renderTable();
      fp_renderLive();
    }).catch(function(){});
  }

  function fp_renderTable(){
    var el = document.getElementById('fp_table');
    if(!fp_fixtures.length){
      el.innerHTML = '<div class="fp-empty">No fixtures defined yet</div>';
      return;
    }
    var html = '<table class="fp-table"><thead><tr>'
      +'<th></th><th>Fix#</th><th>Name</th><th>MAC</th><th>Status</th><th></th>'
      +'</tr></thead><tbody>';
    fp_fixtures.forEach(function(fx){
      var online  = !!fx.online;
      var macShort = fx.mac ? fx.mac.replace(/:/g,'').slice(-6).toUpperCase() : '—';
      var badgeCls = online ? 'online' : 'offline';
      var badgeTxt = online ? 'ONLINE' : 'OFFLINE';
      html += '<tr>'
        +'<td><div style="width:8px;height:8px;border-radius:2px;background:'+fp_fixColor(fx.id)+';"></div></td>'
        +'<td style="color:var(--accent2);">'+fx.id+'</td>'
        +'<td class="fp-name-cell"><input type="text" value="'+escFp(fx.name||'')+'"'
          +' onblur="fp_rename('+fx.id+',this.value)"'
          +' onkeydown="if(event.key===\'Enter\')this.blur();"></td>'
        +'<td class="fp-mac">'+macShort+'</td>'
        +'<td><span class="fp-badge '+badgeCls+'">'+badgeTxt+'</span></td>'
        +'<td style="display:flex;gap:4px;align-items:center;">'
          +(online && fx.mac
            ? '<button class="net-btn sm" onclick="fp_identify(\''+escFp(fx.mac||'')+'\')">ID</button>'
            : '<button class="net-btn sm" style="opacity:0.3;cursor:default;" disabled>ID</button>')
          +'<button class="fp-del" onclick="fp_del('+fx.id+')">&#10005;</button>'
        +'</td>'
        +'</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  function fp_renderLive(){
    var el = document.getElementById('fp_liveTable');
    // Find heads that are not matched to any fixture by MAC
    var patchedMacs = {};
    fp_fixtures.forEach(function(fx){ if(fx.mac) patchedMacs[fx.mac.toUpperCase()] = true; });
    var free = fp_heads.filter(function(h){
      return !h.self && h.mac && !patchedMacs[h.mac.toUpperCase()];
    });
    if(!free.length){
      el.innerHTML = '<div class="fp-empty">All online heads patched</div>';
      return;
    }
    var html = '<table class="fp-table"><thead><tr>'
      +'<th>MAC</th><th>IP</th><th>Fix#</th><th>Name</th><th></th>'
      +'</tr></thead><tbody>';
    free.forEach(function(h){
      var macShort = h.mac.replace(/:/g,'').slice(-6).toUpperCase();
      html += '<tr>'
        +'<td class="fp-mac" title="'+escFp(h.mac)+'">'+macShort+'</td>'
        +'<td class="fp-mac">'+escFp(h.ip||'')+'</td>'
        +'<td style="color:var(--accent2);">'+(h.fixID||'—')+'</td>'
        +'<td>'+escFp(h.name||'')+'</td>'
        +'<td><button class="net-btn sm" onclick="fp_assignHead(\''+escFp(h.mac)+'\','+h.fixID+')">ASSIGN</button></td>'
        +'</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  window.fp_add = function(){
    var fid  = parseInt(document.getElementById('fp_addFix').value) || 0;
    var name = document.getElementById('fp_addName').value.trim();
    if(fid <= 0){ if(typeof toast==='function') toast('Invalid Fix#','err'); return; }
    if(!name) name = 'Fix #' + fid;
    fetch('/api/fixtures',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:fid,name:name,mac:null})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.status==='ok'){
        if(typeof toast==='function') toast('Fix#'+fid+' added');
        document.getElementById('fp_addFix').value = fid+1;
        document.getElementById('fp_addName').value = '';
        fp_load();
      } else if(typeof toast==='function') toast(d.message||'Error','err');
    });
  };

  window.fp_rename = function(fixID, name){
    fetch('/api/fixtures/'+fixID,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:name})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.status==='ok'){
        if(typeof toast==='function') toast('Renamed');
        fp_load();
      }
    });
  };

  window.fp_del = function(fixID){
    fetch('/api/fixtures/'+fixID,{method:'DELETE'}).then(function(){
      if(typeof toast==='function') toast('Fix#'+fixID+' removed');
      fp_load();
    });
  };

  window.fp_identify = function(mac){
    if(typeof toast==='function') toast('Identifying…');
    fetch('/api/heads/'+encodeURIComponent(mac)+'/identify',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({on:true})
    });
    clearTimeout(fp_identifyTimer);
    fp_identifyTimer = setTimeout(function(){
      fetch('/api/heads/'+encodeURIComponent(mac)+'/identify',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({on:false})
      });
    }, 2000);
  };

  window.fp_assignHead = function(mac, currentFixID){
    // Prompt for the Fix# to assign this head to
    var fid = parseInt(prompt('Assign MAC '+mac+' to Fix#:', currentFixID||'1'));
    if(!fid || fid <= 0) return;
    // Create fixture entry if it doesn't exist yet
    var exists = fp_fixtures.find(function(f){return f.id===fid;});
    var doAssign = function(){
      fetch('/api/fixtures/'+fid,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mac:mac})
      }).then(function(r){return r.json();}).then(function(d){
        if(d.status==='ok'){
          // Also set fixID on the device
          fetch('/api/heads/'+encodeURIComponent(mac)+'/fixid',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({fixID:fid})
          });
          if(typeof toast==='function') toast('Assigned MAC → Fix#'+fid);
          fp_load();
        } else if(typeof toast==='function') toast(d.message||'Error','err');
      });
    };
    if(!exists){
      var name = 'Fix #' + fid;
      fetch('/api/fixtures',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:fid,name:name,mac:null})
      }).then(function(){doAssign();});
    } else {
      doAssign();
    }
  };

  function escFp(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  fp_load();
  setInterval(fp_load, 3000);
})();
</script>
